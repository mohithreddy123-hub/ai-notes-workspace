<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark rounded square background -->
  <rect width="100" height="100" rx="22" fill="#1a1a2e"/>
  
  <!-- Document shape -->
  <rect x="30" y="25" width="40" height="50" rx="4" fill="none" stroke="white" stroke-width="4"/>
  <!-- Document fold corner -->
  <polyline points="58,25 58,37 70,37" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Brain-like lines inside document -->
  <line x1="36" y1="48" x2="56" y2="48" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="57" x2="60" y2="57" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="66" x2="52" y2="66" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- AI spark dot -->
  <circle cx="66" cy="66" r="5" fill="#6366f1"/>
</svg>