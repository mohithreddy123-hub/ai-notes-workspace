# Netlify configuration for AI Notes Workspace frontend
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Environment variables (set via Netlify dashboard, not here)
[build.environment]
  NODE_VERSION = "20"

# SPA routing — redirect all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
